<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>OsloTagEditor</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {{content-for "head"}}

    <link integrity="" rel="stylesheet" href="/@embroider/virtual/vendor.css">
    <link integrity="" rel="stylesheet" href="/@embroider/virtual/app.css">

    {{content-for "head-footer"}}
  </head>
  <body>
    {{content-for "body"}}

    <script src="/@embroider/virtual/vendor.js"></script>

    <!-- Node global polyfills required by mdb-reader and alasql transitive deps -->
    <script>
      if (typeof globalThis.process === 'undefined') {
        globalThis.process = {
          env: { NODE_ENV: 'production' },
          browser: true,
          version: 'v20.0.0',
          nextTick: function(fn) { queueMicrotask(fn); },
        };
      }
    </script>

    <script type="module">
      import Application from './app/app';
      import environment from './app/config/environment';

      Application.create(environment.APP);
    </script>

    {{content-for "body-footer"}}
  </body>
</html>
